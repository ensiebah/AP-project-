# File-based H2: marketplace data survives a backend restart.
spring.datasource.url=jdbc:h2:file:./data/secondhand-market
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# Reference data is seeded by DataInitializer / SecondHandBackendApplication.
# Running import.sql on every startup would create duplicate rows in a persistent database.
spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.jpa.show-sql=true

# Real advertisement image files are stored beside the persistent H2 data.
app.upload-directory=./data/uploads
